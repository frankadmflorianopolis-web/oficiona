<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Manuais de Oficina</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #1f2933; /* fondo oscuro */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #ffffff; /* card blanco */
            padding: 35px 45px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
            border: 1px solid #e0e0e0;
            max-width: 520px;
            text-align: center;
        }

        h1 {
            margin-bottom: 16px;
            color: #111827;
            font-size: 26px;
            font-weight: 700;
        }

        p {
            color: #374151;
            font-size: 17px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Manuais de Oficina</h1>
        <p>Manuais dos carros que estavam guardados na oficina.</p>
    </div>
</body>
</html>
